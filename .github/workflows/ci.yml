name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: cd apps/web && pnpm type-check
      - run: cd apps/web && pnpm test:coverage
      - run: cd apps/web && pnpm audit --audit-level=high
        continue-on-error: true  # transitive dev-dep vulns (minimatch, rollup) — not runtime exploitable

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
      - run: cd apps/backend && uv sync
      - run: cd apps/backend && uv run ruff check src/
      - run: cd apps/backend && uv run pytest tests/ --cov=src/ --cov-report=json -q

  functions:
    name: Functions (Lambda handlers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
      - run: cd apps/functions && uv sync --all-extras
      - run: cd apps/functions && uv run ruff check .
      - run: cd apps/functions && uv run pytest tests/

  agents:
    name: Agents (shared utilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
      - run: cd apps/agents && uv sync --all-extras
      - run: cd apps/agents && uv run pytest tests/

  infrastructure:
    name: Infrastructure (CDK synth + Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd apps/infra && npm ci
      - name: Set up QEMU for ARM64 Docker builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - run: cd apps/infra && npx cdk synth
      - run: cd apps/infra && npm test

  security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
      - uses: astral-sh/setup-uv@v4

      - name: npm audit (web)
        run: cd apps/web && pnpm install --frozen-lockfile && pnpm audit --audit-level=high
        continue-on-error: true

      - name: pip-audit (backend)
        run: cd apps/backend && uv sync --extra dev && uv run pip-audit

      - name: pip-audit (functions)
        run: cd apps/functions && uv sync --group dev && uv run pip-audit

      - uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
      - uses: github/codeql-action/analyze@v3
