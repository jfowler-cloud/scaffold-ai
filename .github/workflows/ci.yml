name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: cd apps/web && pnpm type-check
      - run: cd apps/web && pnpm test:coverage
      - run: cd apps/web && pnpm audit --audit-level=high
        continue-on-error: true  # transitive dev-dep vulns (minimatch, rollup) — not runtime exploitable

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd apps/backend && uv sync
      - run: cd apps/backend && uv run ruff check src/
      - run: cd apps/backend && uv run pytest tests/ --cov=src/ --cov-report=json -q

  security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
      - uses: github/codeql-action/analyze@v3
